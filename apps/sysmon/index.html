<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>System Monitor</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		body {
			font: 11px/1.4 -apple-system, "Segoe UI", Cantarell, sans-serif;
			background: rgba(18, 18, 22, 0.82);
			color: #e8e8ea;
			border-radius: 10px;
			border: 1px solid rgba(255, 255, 255, 0.09);
			padding: 12px 14px;
			height: 100vh;
			overflow: hidden;
			-webkit-user-select: none;
			user-select: none;
			cursor: default;
		}

		h1 {
			font-size: 10px;
			font-weight: 600;
			letter-spacing: 0.12em;
			text-transform: uppercase;
			color: #7b7b86;
			margin-bottom: 10px;
		}

		.metric { margin-bottom: 9px; }
		.metric:last-child { margin-bottom: 0; }

		.row { display: flex; justify-content: space-between; margin-bottom: 3px; }
		.label { color: #9a9aa6; letter-spacing: 0.04em; }
		.value { font-variant-numeric: tabular-nums; }

		.track {
			height: 4px;
			border-radius: 2px;
			background: rgba(255, 255, 255, 0.08);
			overflow: hidden;
		}

		.bar {
			height: 100%;
			width: 0;
			border-radius: 2px;
			background: #4c8dff;
			transition: width 0.4s ease, background 0.4s ease;
		}

		/* The bar warms up as the resource fills; set by JS via the `state` class. */
		.bar.warn { background: #e0a33e; }
		.bar.crit { background: #e2564a; }

		.sub { color: #6f6f7a; font-variant-numeric: tabular-nums; }
	</style>
</head>
<body>

	<h1>System</h1>

	<div class="metric">
		<div class="row"><span class="label">CPU</span><span class="value" id="cpu-value">—</span></div>
		<div class="track"><div class="bar" id="cpu-bar"></div></div>
		<div class="row"><span class="sub" id="cpu-sub">&nbsp;</span></div>
	</div>

	<div class="metric">
		<div class="row"><span class="label">Memory</span><span class="value" id="mem-value">—</span></div>
		<div class="track"><div class="bar" id="mem-bar"></div></div>
		<div class="row"><span class="sub" id="mem-sub">&nbsp;</span></div>
	</div>

	<div class="metric">
		<div class="row"><span class="label">Disk</span><span class="value" id="disk-value">—</span></div>
		<div class="track"><div class="bar" id="disk-bar"></div></div>
		<div class="row"><span class="sub" id="disk-sub">&nbsp;</span></div>
	</div>

	<div class="metric">
		<div class="row"><span class="label">Network</span><span class="value" id="net-value">—</span></div>
	</div>

	<script>
		var POLL_MS = 1000;

		function el(id) { return document.getElementById(id); }

		function bytes(n) {
			var units = ['B', 'K', 'M', 'G', 'T'];
			var i = 0;
			while (n >= 1024 && i < units.length - 1) { n /= 1024; i++; }
			return (n < 10 && i > 0 ? n.toFixed(1) : Math.round(n)) + units[i];
		}

		function paint(id, percent, value, sub) {
			el(id + '-value').textContent = value;
			var bar = el(id + '-bar');
			bar.style.width = Math.min(100, percent) + '%';
			bar.className = 'bar' + (percent >= 90 ? ' crit' : percent >= 70 ? ' warn' : '');
			if (sub !== undefined) el(id + '-sub').textContent = sub;
		}

		droplets.recieve = function (stats) {
			if (stats.cpu === null) {
				// First reply after launch: no previous sample to diff against yet.
				el('cpu-sub').textContent = stats.cores + ' cores';
			} else {
				paint('cpu', stats.cpu, stats.cpu.toFixed(1) + '%',
					stats.cores + ' cores · load ' + stats.load.join(' '));
			}

			var mem = stats.mem, memPercent = 100 * mem.used / mem.total;
			paint('mem', memPercent, memPercent.toFixed(0) + '%',
				bytes(mem.used) + ' of ' + bytes(mem.total));

			var disk = stats.disk, diskPercent = 100 * disk.used / disk.total;
			paint('disk', diskPercent, diskPercent.toFixed(0) + '%',
				bytes(disk.total - disk.used) + ' free of ' + bytes(disk.total));

			if (stats.net) {
				el('net-value').textContent =
					'↓ ' + bytes(stats.net.rx) + '/s   ↑ ' + bytes(stats.net.tx) + '/s';
			}

			// Chained rather than setInterval: one request in flight at a time,
			// so a slow reply can't queue a backlog of them.
			setTimeout(poll, POLL_MS);
		};

		function poll() {
			droplets.send(JSON.stringify({ method: 'stats', args: {} }));
		}

		poll();
	</script>

</body>
</html>
