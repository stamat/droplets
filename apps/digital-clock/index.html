<!doctype html>
<html lang="en">
<head>
	<meta charset="utf-8">
	<title>Digital Clock</title>
	<style>
		* { margin: 0; padding: 0; box-sizing: border-box; }

		/* fit_content measures documentElement: keep the root content-sized
		   (not viewport-filling) so the window shrink-wraps to the digits. */
		html { width: max-content; }

		main {
			font: 11px/1.3 -apple-system, "Segoe UI", Cantarell, sans-serif;
			background: rgba(18, 18, 22, 0.82);
			color: #e8e8ea;
			border-radius: 10px;
			border: 1px solid rgba(255, 255, 255, 0.09);
			padding: 12px 18px 13px;
			overflow: hidden;
			text-align: center;
			-webkit-user-select: none;
			user-select: none;
			cursor: default;
		}

		.label {
			font-size: 10px;
			font-weight: 600;
			letter-spacing: 0.14em;
			text-transform: uppercase;
			color: #7b7b86;
			margin-bottom: 4px;
		}

		.time {
			font-size: 40px;
			font-weight: 300;
			line-height: 1.05;
			letter-spacing: 0.01em;
			font-variant-numeric: tabular-nums;
			white-space: nowrap;
		}

		.date {
			margin-top: 4px;
			font-size: 11px;
			color: #9a9aa6;
			font-variant-numeric: tabular-nums;
			white-space: nowrap;
		}
	</style>
</head>
<body>
	<main>
		<div class="label" id="label">Local</div>
		<div class="time" id="time">--:--</div>
		<div class="date" id="date"></div>
	</main>

	<script>
		// Fallback until droplet_options replies; the manager edits these.
		var options = { timezone: 'Local', hour24: true, seconds: true, show_date: true, label: '' };
		var timeFmt, dateFmt;

		function el(id) { return document.getElementById(id); }

		function tzArg() {
			// undefined -> Intl uses the system zone (the "Local" choice).
			return (options.timezone && options.timezone !== 'Local') ? options.timezone : undefined;
		}

		function deriveLabel() {
			if (options.label) return options.label;
			if (!options.timezone || options.timezone === 'Local') return 'Local';
			var parts = options.timezone.split('/');
			return parts[parts.length - 1].replace(/_/g, ' ');
		}

		function buildFormatters() {
			var tz = tzArg();
			try {
				timeFmt = new Intl.DateTimeFormat([], {
					hour: '2-digit', minute: '2-digit',
					second: options.seconds ? '2-digit' : undefined,
					hour12: !options.hour24, timeZone: tz
				});
				dateFmt = new Intl.DateTimeFormat([], {
					weekday: 'short', day: 'numeric', month: 'short', year: 'numeric', timeZone: tz
				});
			} catch (e) {
				// Bad IANA name (e.g. hand-edited settings) -> fall back to local.
				console.warn('digital-clock: invalid timezone', options.timezone, e);
				options.timezone = 'Local';
				return buildFormatters();
			}
			el('label').textContent = deriveLabel();
			el('date').style.display = options.show_date ? '' : 'none';
		}

		function render() {
			var now = new Date();
			el('time').textContent = timeFmt.format(now);
			if (options.show_date) el('date').textContent = dateFmt.format(now);
		}

		function tick() {
			render();
			// Re-fire on the next whole second so the seconds field never lags.
			setTimeout(tick, 1000 - (Date.now() % 1000));
		}

		droplets.recieve = function (opts) {
			if (opts && typeof opts === 'object') options = opts;
			buildFormatters();
			render();
		};

		buildFormatters();  // paint immediately with the defaults
		tick();
		droplets.send(JSON.stringify({ method: 'droplet_options', args: {} }));
	</script>

</body>
</html>
